name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'cloud/runpod/**'
      - 'third_party/Qwen3-TTS/finetuning/**'
      - '.github/workflows/docker-inference.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/runpod/Dockerfile.inference-lite
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/qwen3-tts-inference:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/qwen3-tts-inference:${{ github.sha }}
          cache-from: type=gha,scope=inference
          cache-to: type=gha,mode=max,scope=inference

  build-training:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/runpod/Dockerfile.training
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/qwen3-tts-training:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/qwen3-tts-training:${{ github.sha }}
          cache-from: type=gha,scope=training
          cache-to: type=gha,mode=max,scope=training
